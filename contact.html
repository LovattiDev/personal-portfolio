<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>

    <link rel="stylesheet" href="style/global.css">
    <link rel="stylesheet" href="style/font.css">
    <link rel="stylesheet" href="style/pages/contact-page.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
</head>
<body>
    <section>
        <div class="contact-container">
            <!-- Lado esquerdo: redes sociais -->
            <div class="contact-left">
                <h1 id="contact-title">GET IN TOUCH.</h1>
                <p>Let’s build something great together.<br> Feel free to reach out if you have a project, idea, or opportunity.</p>

                <ul class="social-list">
                    <li><a href="https://github.com/LovattiDev" target="_blank"><i class="fa-brands fa-github"></i></a></li>
                    <li><a href="https://www.linkedin.com/in/matheus-amorim-lovatti-8a74a72b1" target="_blank"><i class="fa-brands fa-linkedin"></i></a></li>
                    <li><a href="https://www.instagram.com/matheus_lovatti/" target="_blank"><i class="fa-brands fa-square-instagram"></i></a></li>
                    <li><a href="mailto:matheusamorimlovatti@gmail.com" target="_blank"><i class="fa-solid fa-envelope"></i></a></li>
                </ul>
                <p id="contact-email-text">matheusamorimlovatti@gmail.com</p>

                <a id="contact-go-home-desktop" class="contact-go-home" href="index.html"><i class="fa-solid fa-circle-left"> Go Home.</i></a>
            </div>

            <!-- Lado direito: formulário -->
            <div class="contact-right">
                <h1>CONTACT FORM</h1>
                <form class="contact-form" action="https://api.web3forms.com/submit" method="POST">
                    <input type="hidden" name="access_key" value="4b78defc-1e39-4098-8021-88b4c59df3c8">


                    <!-- Tipo de contato -->
                    <select name="contact_type" id="contactType" required>
                        <option value="" disabled selected>Select Contact Type</option>
                        <option value="client">Client (Project Inquiry)</option>
                        <option value="recruiter">Recruiter</option>
                        <option value="company">Company</option>
                        <option value="other">Other</option>
                    </select>

                    <!-- Campos padrão -->
                    <input type="text" name="name" placeholder="Your Name" required>
                    <input type="email" name="email" placeholder="Your Email" required>

                    <!-- Campos dinâmicos -->
                    <div id="dynamicFields"></div>
                    <textarea name="message" placeholder="Your Message" rows="5" required></textarea>


                    <button type="submit">Send Message</button>
                </form>
                <a id="contact-go-home-mobile" class="contact-go-home" href="index.html"><i class="fa-solid fa-circle-left"> Go Home.</i></a>
            </div>
        </div>
    </section>

    <script src="script/dinamic-fields.js"></script>
</body>
</html>
