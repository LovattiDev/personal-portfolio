<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>

    <link rel="stylesheet" href="style/global.css">
    <link rel="stylesheet" href="style/font.css">
    <link rel="stylesheet" href="style/pages/contact-page.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
</head>
<body>
    <section>
        <div class="contact-container">
            <!-- Lado esquerdo: redes sociais -->
            <div class="contact-left">
                <h1 id="contact-title">GET IN TOUCH.</h1>
                <p>Let’s build something great together.<br> Feel free to reach out if you have a project, idea, or opportunity.</p>

                <ul class="social-list">
                    <li><a href="#" target="_blank"><i class="fa-brands fa-github"></i></a></li>
                    <li><a href="#" target="_blank"><i class="fa-brands fa-linkedin"></i></a></li>
                    <li><a href="#" target="_blank"><i class="fa-brands fa-square-instagram"></i></a></li>
                    <li><a href="#" target="_blank"><i class="fa-solid fa-envelope"></i></a></li>
                </ul>
                <p id="contact-email-text">matheusamorimlovatti@gmail.com</p>

                <a id="contact-go-home-desktop" class="contact-go-home" href="index.html"><i class="fa-solid fa-circle-left"> Go Home.</i></a>
            </div>

            <!-- Lado direito: formulário -->
            <div class="contact-right">
                <h1>CONTACT FORM</h1>
                <form class="contact-form">
                    <input type="text" name="name" placeholder="Your Name" required>
                    <input type="email" name="email" placeholder="Your Email" required>
                    <textarea name="message" placeholder="Your Message" rows="5" required></textarea>
                    <button type="submit">Send Message</button>
                </form>
                <a id="contact-go-home-mobile" class="contact-go-home" href="index.html"><i class="fa-solid fa-circle-left"> Go Home.</i></a>
            </div>
        </div>
    </section>
</body>
</html>
